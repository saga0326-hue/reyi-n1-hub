<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>輔助系統入口</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #007bff;
            --bg-color: #f4f7f9;
        }
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 15px;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        /* 條碼系統專屬按鈕顏色 */
        .btn-barcode {
            background-color: var(--secondary-color);
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }
        /* 其他功能按鈕預設顏色 */
        .btn-default {
            background-color: #6c757d;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>輔助系統入口</h1>
    
    <div class="btn-group">
        <a href="https://mainpy-tgqcgwqzn3shhtnyp62me4.streamlit.app/" 
           target="_blank" 
           class="btn btn-barcode">
            🚀 進入條碼測試系統
        </a>

        <a href="#" class="btn btn-default">📁 行政表單查詢</a>
        <a href="#" class="btn btn-default">📅 聯絡資訊</a>
    </div>

    <div class="footer">
        © 2026 日翊北一課 - 輔助系統
    </div>
</div>

</body>
</html>
